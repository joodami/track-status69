<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามสถานะเอกสาร - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a5276; /* สีน้ำเงินเข้มภูมิฐาน */
            --accent-color: #3498db;
            --bg-color: #f0f4f8;
        }

        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); color: #2c3e50; line-height: 1.6; }
        
        /* Navbar สไตล์มินิมอล */
        .navbar { background: white !important; border-bottom: 2px solid var(--primary-color); padding: 15px 0; }
        .navbar-brand { color: var(--primary-color) !important; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .school-logo { height: 45px; width: auto; }

        /* หน้า Login */
        .login-container { max-width: 420px; margin: 60px auto; padding: 20px; }
        .card-login { 
            border-radius: 25px; border: none; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            padding: 40px 30px; background: white; 
            position: relative; overflow: hidden;
        }
        .card-login::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--primary-color);
        }
        
        .pass-group { position: relative; margin-bottom: 25px; }
        .pass-input { 
            font-size: 24px; letter-spacing: 12px; text-align: center; 
            border-radius: 12px; border: 2px solid #edf2f7; 
            padding: 12px; transition: 0.3s; background: #f8fafc;
        }
        .pass-input:focus { border-color: var(--accent-color); box-shadow: none; background: white; }
        .eye-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #cbd5e0; letter-spacing: normal; }

        .btn-login { 
            border-radius: 12px; padding: 14px; width: 100%; font-weight: 600; 
            background: var(--primary-color); border: none; color: white; 
            transition: 0.3s; box-shadow: 0 4px 12px rgba(26, 82, 118, 0.2);
        }
        .btn-login:hover { background: #154360; transform: translateY(-1px); }

        /* หน้าแสดงผล */
        #resultSection { display: none; padding-top: 30px; }
        .user-info { 
            background: white; border-radius: 20px; padding: 20px; 
            margin-bottom: 25px; border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .card-table { 
            border-radius: 20px; border: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.04); 
            background: white; overflow: hidden; 
        }

        .table thead { background-color: #f8fafc; }
        .table th { padding: 15px; color: #64748b; font-weight: 600; font-size: 0.85rem; border: none; }
        .table td { padding: 15px 10px; border-bottom: 1px solid #f1f5f9; }

        /* ป้ายสถานะมินิมอล */
        .status-pending { background: #fff7ed; color: #c2410c; border-radius: 8px; padding: 4px 12px; font-size: 0.8rem; font-weight: 600; border: 1px solid #ffedd5; }
        .status-success { background: #f0fdf4; color: #15803d; border-radius: 8px; padding: 4px 12px; font-size: 0.8rem; font-weight: 600; border: 1px solid #dcfce7; }
        
        .btn-open { 
            background: white; color: var(--primary-color); 
            border: 1px solid var(--primary-color); border-radius: 8px; 
            font-size: 0.8rem; padding: 6px 12px; transition: 0.2s;
        }
        .btn-open:hover { background: var(--primary-color); color: white; }

        .pagination-container { margin-top: 25px; }

        @media (max-width: 576px) {
            .navbar-brand { font-size: 0.95rem; }
            .school-logo { height: 35px; }
            .card-login { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#">
            <img src="https://via.placeholder.com/100x100?text=LOGO" alt="Logo" class="school-logo">
            <span>ตรวจสอบสถานะเสนอเซ็นหนังสือ</span>
        </a>
    </div>
</nav>

<div class="container">
    <div id="loginArea" class="login-container">
        <div class="card-login text-center">
            <h4 class="fw-bold mb-1">เข้าสู่ระบบ</h4>
            <p class="text-muted mb-4 small">งานยานพาหนะ โรงเรียนพิมานพิทยาสรรค์</p>
            
            <label class="d-block text-start mb-2 small text-muted">ระบุเลขท้ายเบอร์โทรศัพท์ 4 ตัว</p>
            <div class="pass-group">
                <input type="password" id="secretInput" class="form-control pass-input" maxlength="4" placeholder="****" onkeypress="if(event.keyCode==13) verifyAndSearch()">
                <i class="fa-solid fa-eye eye-icon" id="toggleEye" onclick="togglePassword()"></i>
            </div>

            <button class="btn btn-primary btn-login" onclick="verifyAndSearch()">เข้าสู่ระบบ</button>
            <div id="errorMsg" class="text-danger mt-3 small" style="display:none;">❌ ไม่พบข้อมูลกรุณาตรวจสอบรหัสอีกครั้ง</div>
        </div>
    </div>

    <div id="resultSection">
        <div class="user-info d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <div style="width: 45px; height: 45px; background: #e0e7ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-color); font-weight: bold;">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div>
                    <div class="text-muted" style="font-size: 0.7rem; text-transform: uppercase;">ผู้ใช้งานระบบ</div>
                    <strong id="displayName" style="font-size: 1.1rem; color: var(--primary-color);">กำลังโหลด...</strong>
                </div>
            </div>
            <button class="btn btn-sm btn-outline-secondary" onclick="location.reload()" style="border-radius: 10px; font-size: 0.75rem;">
                <i class="fa-solid fa-right-from-bracket me-1"></i> ออกจากระบบ
            </button>
        </div>

        <div class="card-table p-2">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>วันที่</th>
                            <th>รายละเอียดเรื่อง</th>
                            <th class="text-center">สถานะ</th>
                            <th class="text-center">การจัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="pagination-container d-flex justify-content-between align-items-center">
            <button id="prevBtn" class="btn btn-light btn-sm px-3" style="border-radius:10px" onclick="changePage(-1)">
                <i class="fa-solid fa-chevron-left"></i> ย้อนกลับ
            </button>
            <span class="text-muted" style="font-size: 0.85rem;">หน้า <span id="pageInfo" class="fw-bold text-dark">1 / 1</span></span>
            <button id="nextBtn" class="btn btn-light btn-sm px-3" style="border-radius:10px" onclick="changePage(1)">
                ถัดไป <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
        
        <footer class="text-center mt-5 mb-4">
            <p class="text-muted" style="font-size: 0.75rem;">© 2026 งานยานพาหนะ โรงเรียนพิมานพิทยาสรรค์<br>สงวนลิขสิทธิ์ข้อมูลตามระเบียบงานสารบรรณ</p>
        </footer>
    </div>
</div>

<script>
    // --- (ส่วนของ JavaScript เหมือนเดิมจากรอบที่แล้ว แต่ใช้ฟังก์ชันแสดงผลที่สอดคล้องกับ Class ใหม่นะคะ) ---
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLuCaClwlyTiMxxYl6fXMwK9WjE7pdvC3Sf1HdlDCRlHLy4OrwYSkxE8zfaMSjCdjOoQ/exec"; 
    let allData = [];
    let filteredData = []; 
    let currentPage = 1;
    const rowsPerPage = 20;
    let logoutTimer;

    function togglePassword() {
        const input = document.getElementById('secretInput');
        const eye = document.getElementById('toggleEye');
        if (input.type === "password") {
            input.type = "text";
            eye.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            eye.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function resetLogoutTimer() {
        clearTimeout(logoutTimer);
        logoutTimer = setTimeout(() => { location.reload(); }, 5 * 60 * 1000); 
    }
    window.onload = resetLogoutTimer; window.onmousemove = resetLogoutTimer; window.onkeypress = resetLogoutTimer;

    async function fetchData() {
        try {
            const response = await fetch(GAS_WEB_APP_URL);
            allData = await response.json();
        } catch (error) { console.error("Error:", error); }
    }

    function verifyAndSearch() {
        const inputCode = document.getElementById('secretInput').value.trim();
        if (inputCode.length < 4) { alert("กรุณากรอกรหัส 4 หลักค่ะ"); return; }
        filteredData = allData.filter(item => item.secretCode === inputCode).reverse();
        if (filteredData.length > 0) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('displayName').innerText = filteredData[0].userName; 
            currentPage = 1; 
            displayTable();
        } else { document.getElementById('errorMsg').style.display = 'block'; }
    }

    function displayTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const paginatedItems = filteredData.slice(start, end);

        paginatedItems.forEach(item => {
            const statusClass = item.status === "พิจารณาแล้ว" ? "status-success" : "status-pending";
            tableBody.innerHTML += `
                <tr>
                    <td style="color: #64748b; font-size: 0.85rem;">${item.date}</td>
                    <td><div style="font-weight: 600; color: #1e293b; font-size: 0.95rem;">${item.title}</div></td>
                    <td class="text-center"><span class="${statusClass}">${item.status}</span></td>
                    <td class="text-center">
                        ${item.file ? `<a href="${item.file}" target="_blank" class="btn btn-sm btn-open"><i class="fa-solid fa-file-pdf me-1"></i> เปิดดู</a>` : '<span class="text-muted" style="font-size:0.7rem">ไม่มีไฟล์</span>'}
                    </td>
                </tr>`;
        });
        updatePaginationControls();
    }

    function updatePaginationControls() {
        const totalPages = Math.ceil(filteredData.length / rowsPerPage) || 1;
        document.getElementById('pageInfo').innerText = `${currentPage} / ${totalPages}`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages);
    }

    function changePage(direction) {
        currentPage += direction;
        displayTable();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    fetchData();
</script>
</body>
</html>
