<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามสถานะเอกสาร - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .card-summary { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-pending { background-color: #fd7e14; color: white; border-radius: 20px; padding: 2px 12px; font-size: 0.85rem; }
        .status-success { background-color: #28a745; color: white; border-radius: 20px; padding: 2px 12px; font-size: 0.85rem; }
        .search-box { border-radius: 25px; padding-left: 20px; border: 2px solid #dee2e6; }
        .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <span class="navbar-brand">📌 ติดตามสถานะเสนอเซ็นหนังสือ</span>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-6 mb-3">
            <div class="card card-summary text-center p-3">
                <h6 class="text-muted">กำลังดำเนินการ (รอพิจารณา)</h6>
                <h2 id="countPending" class="text-warning">0</h2>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card card-summary text-center p-3">
                <h6 class="text-muted">พิจารณาแล้ว</h6>
                <h2 id="countSuccess" class="text-success">0</h2>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <input type="text" id="searchInput" class="form-control search-box" placeholder="🔍 พิมพ์ชื่อผู้เสนอเซ็นเพื่อค้นหา..." onkeyup="filterData()">
        </div>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>วันที่</th>
                        <th>เรื่อง</th>
                        <th>ผู้เสนอเซ็น</th>
                        <th class="text-center">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" class="text-center">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ** สำคัญ: นำ URL ของ Web App จาก Google Script มาใส่ที่นี่ **
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLuCaClwlyTiMxxYl6fXMwK9WjE7pdvC3Sf1HdlDCRlHLy4OrwYSkxE8zfaMSjCdjOoQ/exec"; 

    let allData = [];

    async function fetchData() {
        try {
            const response = await fetch(GAS_WEB_APP_URL);
            allData = await response.json();
            updateDashboard(allData);
            renderTable(allData);
        } catch (error) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="text-center text-danger">ไม่สามารถโหลดข้อมูลได้</td></tr>';
        }
    }

    function renderTable(data) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        
        data.reverse().forEach(item => { // แสดงข้อมูลล่าสุดขึ้นก่อน
            const statusClass = item.status === "พิจารณาแล้ว" ? "status-success" : "status-pending";
            const row = `
                <tr>
                    <td>${item.date}</td>
                    <td>${item.title}</td>
                    <td>${item.name}</td>
                    <td class="text-center"><span class="${statusClass}">${item.status}</span></td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

        if(data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" class="text-center">ไม่พบข้อมูล</td></tr>';
        }
    }

    function updateDashboard(data) {
        const pending = data.filter(i => i.status !== "พิจารณาแล้ว").length;
        const success = data.filter(i => i.status === "พิจารณาแล้ว").length;
        document.getElementById('countPending').innerText = pending;
        document.getElementById('countSuccess').innerText = success;
    }

    function filterData() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(item => 
            item.name.toLowerCase().includes(query) || 
            item.title.toLowerCase().includes(query)
        );
        renderTable(filtered);
    }

    // เริ่มโหลดข้อมูลเมื่อเปิดหน้าเว็บ
    fetchData();
</script>

</body>
</html>
